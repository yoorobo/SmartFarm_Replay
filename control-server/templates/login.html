<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Farm System - Login</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.7);
            --primary: #238636;
            --primary-hover: #2ea043;
            --text: #c9d1d9;
            --text-muted: #8b949e;
            --border: #30363d;
            --error: #f85149;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 100% 0%, rgba(35, 134, 54, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(35, 134, 54, 0.1) 0%, transparent 50%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
            background: linear-gradient(135deg, #42d392 0%, #647eff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            background-color: #0d1117;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(35, 134, 54, 0.3);
        }

        .btn-primary {
            width: 100%;
            padding: 10px 16px;
            background-color: var(--primary);
            color: #ffffff;
            border: 1px solid rgba(240, 246, 252, 0.1);
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .error-msg {
            color: var(--error);
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
            background: rgba(248, 81, 73, 0.1);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(248, 81, 73, 0.4);
        }

        .hint {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo">
        <h1>🌱 Smart Farm</h1>
        <p>통합 관제 시스템</p>
    </div>

    <form method="POST" action="/login">
        <div class="form-group">
            <label for="username">사용자명</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="ID를 입력하세요" required autofocus>
        </div>
        
        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
        </div>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <button type="submit" class="btn-primary" style="margin-top: 10px;">로그인</button>
    </form>

    <div class="hint">
        테스트 계정: admin / admin123
    </div>
</div>

</body>
</html>
